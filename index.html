<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibreglass Workshop Gel Time Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    margin:0;
    padding:0;
}

header{
    background:#ff6600;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    font-size:18px;
    border-radius:6px;
    border:none;
}

button{
    width:100%;
    padding:18px;
    font-size:20px;
    background:#ff6600;
    color:white;
    border:none;
    border-radius:6px;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
Fibreglass Workshop Gel Time Calculator
</header>

<div class="container">

<h2>Resin Calibration</h2>

<label>Base Temperature (°C)</label>
<input id="baseTemp" type="number" value="27">

<label>Base Catalyst (%)</label>
<input id="baseCat" type="number" value="1">

<label>Base Gel Time (minutes)</label>
<input id="baseGel" type="number" value="59">


<h2>Current Conditions</h2>

<label>Current Temperature (°C)</label>
<input id="temp" type="number" placeholder="e.g. 30">

<label>Desired Working Time / Gel Time (minutes)</label>
<input id="targetGel" type="number" placeholder="e.g. 40">

<label>Resin Amount (grams)</label>
<input id="resinWeight" type="number" placeholder="e.g. 2000">

<button onclick="calculateCatalyst()">Calculate Catalyst</button>

<div class="result" id="output"></div>

</div>

<script>

function calculateCatalyst(){

let baseTemp = parseFloat(document.getElementById("baseTemp").value);
let baseCat = parseFloat(document.getElementById("baseCat").value);
let baseGel = parseFloat(document.getElementById("baseGel").value);

let temp = parseFloat(document.getElementById("temp").value);
let targetGel = parseFloat(document.getElementById("targetGel").value);
let resinWeight = parseFloat(document.getElementById("resinWeight").value);

if(!temp || !targetGel || !resinWeight){
document.getElementById("output").innerHTML="Please fill all fields";
return;
}

/* Temperature scaling */
let tempFactor = Math.pow(0.5,(temp-baseTemp)/10);

/* Solve catalyst percentage */
let catalystPercent = baseCat*((baseGel*tempFactor)/targetGel);

/* Catalyst weight in grams */
let catalystGrams = resinWeight*(catalystPercent/100);

/* Convert grams to ml (MEKP density ~1.1 g/ml) */
let catalystML = catalystGrams/1.1;

document.getElementById("output").innerHTML =
"Catalyst Required:<br><br>"+
catalystPercent.toFixed(2)+" %<br>"+
catalystML.toFixed(1)+" ml";

}

</script>

</body>
</html>
