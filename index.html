<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibreglass Workshop Resin Calculator</title>

<style>
body {
font-family: Arial, sans-serif;
background: #1e1e1e;
color: white;
margin: 0;
padding: 0;
}

header {
background: #ff6600;
padding: 15px;
text-align: center;
font-size: 22px;
font-weight: bold;
}

.container {
padding: 20px;
}

input {
width: 100%;
padding: 15px;
margin: 10px 0;
font-size: 18px;
border-radius: 6px;
border: none;
}

button {
width: 100%;
padding: 18px;
font-size: 20px;
background: #ff6600;
color: white;
border: none;
border-radius: 6px;
}

.result {
margin-top: 20px;
font-size: 22px;
font-weight: bold;
}
</style>
</head>

<body>

<header>
Fibreglass Workshop Resin Calculator
</header>

<div class="container">

<h2>Resin Calibration (Real Gel Test)</h2>

<label>Base Temperature (°C)</label>
<input id="baseTemp" type="number" value="27">

<label>Base Catalyst (%)</label>
<input id="baseCat" type="number" value="1">

<label>Base Gel Time (minutes)</label>
<input id="baseGel" type="number" value="59">

<h2>Current Conditions</h2>

<label>Current Temperature (°C)</label>
<input id="temp" type="number" placeholder="30">

<label>Desired Working Time (minutes)</label>
<input id="workingTime" type="number" placeholder="40">

<label>Resin Amount (kg)</label>
<input id="resinWeight" type="number" placeholder="2.00" step="0.01">

<button onclick="calculateCatalyst()">Calculate Catalyst</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateCatalyst(){

let baseTemp = parseFloat(document.getElementById("baseTemp").value);
let baseCat = parseFloat(document.getElementById("baseCat").value);
let baseGel = parseFloat(document.getElementById("baseGel").value);

let temp = parseFloat(document.getElementById("temp").value);
let targetGel = parseFloat(document.getElementById("workingTime").value);
let resinKg = parseFloat(document.getElementById("resinWeight").value);

if(isNaN(temp) || isNaN(targetGel) || isNaN(resinKg)){
document.getElementById("result").innerHTML =
"Please enter temperature, working time and resin weight.";
return;
}

/* Convert resin to grams */
let resinGrams = resinKg * 1000;

/* temperature effect */
let tempFactor = Math.pow(0.5, (temp - baseTemp) / 10);

/* calculate catalyst percentage */
let catalystPercent = baseCat * ((baseGel * tempFactor) / targetGel);

/* catalyst grams */
let catalystGrams = resinGrams * (catalystPercent / 100);

/* convert to ml (MEKP density ≈ 1.1 g/ml) */
let catalystML = catalystGrams / 1.1;

document.getElementById("result").innerHTML =
"Catalyst Required:<br><br>" +
catalystPercent.toFixed(2) + "%<br>" +
catalystML.toFixed(2) + " ml";

}

</script>

</body>
</html>
